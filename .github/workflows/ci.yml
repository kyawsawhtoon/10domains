# nyann:ci:start
# nyann CI workflow — TypeScript
# Generated by bin/gen-ci.sh from the project's nyann profile.
# Edit freely outside the marker comments; regeneration replaces only
# the region between # nyann:ci:start / # nyann:ci:end.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install pnpm (if pnpm)
        if: ${{ 'pnpm' == 'pnpm' }}
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type check
        run: pnpm run typecheck 2>/dev/null || npx tsc --noEmit

      - name: Test
        run: pnpm test
# nyann:ci:end
